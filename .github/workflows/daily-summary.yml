name: Daily Horizon Summary

on:
  schedule:
    - cron: '30 0 * * *'  # 每天北京时间 8:30 运行
      timezone: 'Asia/Shanghai'
  workflow_dispatch:      # 支持手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (with Twitter support)
        run: uv sync --extra twitter

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      - name: Write Twitter cookie from secret
        run: echo '${{ secrets.TWITTER_COOKIE }}' > /tmp/x_cookies_1.json

      - name: Prepare config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 48

      - name: Set current date as env
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
